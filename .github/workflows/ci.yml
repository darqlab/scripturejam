name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (server)
        run: pnpm --filter @scripturejam/server typecheck

      - name: Typecheck (web)
        run: pnpm --filter @scripturejam/web typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  content-schema:
    name: Content schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: pip install uv
      - name: Validate content schemas
        working-directory: content-tools
        run: |
          uv sync
          uv run python -m pytest tests/ -v

  content-tools:
    name: Content tools (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: pip install uv
      - working-directory: content-tools
        run: uv sync
      - name: Ruff lint
        working-directory: content-tools
        run: uv run ruff check src/
      - name: Pytest
        working-directory: content-tools
        run: uv run pytest tests/ -v
