pack:
  id: named_characters
  title: Named Characters
  description: "Who did what in the Bible? Identify the person behind the act."
  ageBand: all-ages
  questionIds:
    - nc-001
    - nc-002
    - nc-003
    - nc-004
    - nc-005
    - nc-006
    - nc-007
    - nc-008
    - nc-009
    - nc-010
    - nc-011
    - nc-012
    - nc-013
    - nc-014
    - nc-015
    - nc-016
    - nc-017
    - nc-018
